# Local development only. Production deployments define their own compose files.
services:
  openclaw:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22 AS deps
        RUN apt-get update -qq && \
            apt-get install -y --no-install-recommends python3 make g++ && \
            rm -rf /var/lib/apt/lists/*
        WORKDIR /plugins
        RUN npm init -y && npm install --save \
              @agentclientprotocol/sdk@^0.17.0 \
              bcrypt@^6.0.0 \
              chokidar@^4.0.3 \
              jsonwebtoken@^9.0.3 \
              mime-types@^3.0.2 \
              pino@^10.3.1 \
              ws@^8.20.0 \
              zod@^3.24.2

        FROM ghcr.io/openclaw/openclaw:latest
        USER root
        WORKDIR /plugins
        COPY --from=deps /plugins/node_modules ./node_modules
        COPY sandbox/openclaw-entrypoint.sh /scripts/openclaw-entrypoint.sh
        RUN chmod +x /scripts/openclaw-entrypoint.sh && \
            mkdir -p /plugins/node_modules/@ai-spaces/shared
    user: root
    entrypoint: ["/bin/sh", "/scripts/openclaw-entrypoint.sh"]
    environment:
      OPENCLAW_HOME: /home/openclaw
      OPENCLAW_SANDBOX_HOME: /home/openclaw
      PLUGIN_DIST: /plugins/ai-spaces/index.js
      OPENCLAW_GATEWAY_PORT: "19000"
      OPENCLAW_DISABLE_BONJOUR: "1"
      AI_SPACES_URL: http://dev:3001
      AI_SPACES_WS_PORT: "3002"
      PLUGIN_URL: http://openclaw:3002
      GATEWAY_URL: http://openclaw:19000
      AI_SPACES_AGENT_BASE_URL: http://dev:3001
      AI_SPACES_ROOT: /home/openclaw/workspace
      AI_SPACES_DEV_PAIRING_FILE: /dev-pairing/openclaw-pairing.json
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    volumes:
      - openclaw-home:/home/openclaw
      - dev-pairing:/dev-pairing:ro
      - ./packages/plugin/dist:/plugins/ai-spaces:ro
      - ./packages/shared/dist:/plugins/node_modules/@ai-spaces/shared/dist:ro
      - ./packages/shared/package.json:/plugins/node_modules/@ai-spaces/shared/package.json:ro
      - ./sandbox/templates/.openclaw/openclaw.json.tpl:/tpl/openclaw.json.tpl:ro
      - ./sandbox/templates/workspace:/tpl/workspace:ro
      - ./sandbox/templates/workspaces:/tpl/workspaces:ro
      - ./sandbox/templates/brain:/tpl/brain:ro
      - ${HOME}/.local/share/opencode/auth.json:/tpl/opencode-auth.json:ro
    networks:
      - ai-spaces

  dev:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-alpine
        RUN apk add --no-cache python3 make g++ git
        WORKDIR /build
        COPY package.json package-lock.json ./
        COPY packages/shared/package.json ./packages/shared/
        COPY packages/server/package.json ./packages/server/
        COPY packages/web/package.json ./packages/web/
        COPY packages/plugin/package.json ./packages/plugin/
        RUN npm ci
        COPY tsconfig.base.json ./
    command: |
      sh -c "set -e
             mkdir -p /plugins
             mkdir -p /dev-pairing
             rm -f /plugins/openclaw-spaces-*.tar.gz /plugins/openclaw-spaces.meta.json
             if [ -d /plugin-source/openclaw-spaces/dist ]; then node /build/package-openclaw-plugin.mjs --dist /plugin-source/openclaw-spaces/dist --package /plugin-source/openclaw-spaces/package.json --out /plugins; fi
             npm run build:shared
             npx tsx sandbox/seed-dev-data.ts
             npx tsx watch packages/server/src/index.ts &
             node_modules/.bin/vite packages/web --port 80 &
             npx tsx sandbox/seed-dev-rooms.ts &
             wait"
    labels:
      - "dev.orbstack.dev.domain=dev.local.jesschadwick.com"
    environment:
      GATEWAY_URL: http://openclaw:19000
      PLUGIN_SPACES_URL: http://openclaw:3002
      AI_SPACES_DATA: /data
      AI_SPACES_DB: /data/ai-spaces.db
      AI_SPACES_DEV_PAIRING_FILE: /dev-pairing/openclaw-pairing.json
      ALLOW_OPEN_REGISTRATION: "true"
      # Vite uses this to proxy /api and /ws to the server within the container
      AI_SPACES_URL: http://127.0.0.1:3001
      AI_SPACES_AGENT_BASE_URL: http://dev:3001
      AI_SPACES_PLUGIN_DIR: /plugins
      # Google OAuth (optional - set via .env or docker-compose.override.yml)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-https://dev.local.jesschadwick.com/api/auth/google/callback}
    volumes:
      - dev-data:/data
      - dev-pairing:/dev-pairing
      # Server source (tsx watch)
      - ./packages/server/src:/build/packages/server/src:ro
      - ./packages/server/tsconfig.json:/build/packages/server/tsconfig.json:ro
      - ./packages/server/drizzle:/build/packages/server/drizzle:ro
      # Shared source (rebuild on restart)
      - ./packages/shared/src:/build/packages/shared/src:ro
      - ./packages/shared/tsconfig.json:/build/packages/shared/tsconfig.json:ro
      # Web source (Vite HMR)
      - ./packages/web/src:/build/packages/web/src:ro
      - ./packages/web/public:/build/packages/web/public:ro
      - ./packages/web/index.html:/build/packages/web/index.html:ro
      - ./packages/web/vite.config.ts:/build/packages/web/vite.config.ts:ro
      - ./tsconfig.base.json:/build/tsconfig.base.json:ro
      - ./.git:/build/.git:ro
      - ./REMOTE_AGENTS.md:/build/REMOTE_AGENTS.md:ro
      - ./scripts/package-openclaw-plugin.mjs:/build/package-openclaw-plugin.mjs:ro
      - ./packages/plugin/dist:/plugin-source/openclaw-spaces/dist:ro
      - ./packages/plugin/package.json:/plugin-source/openclaw-spaces/package.json:ro
      - ./sandbox:/build/sandbox:ro
    ports:
      - "3000:80"
      - "3001:3001"
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    depends_on:
      - openclaw
    networks:
      - ai-spaces

  drizzle-studio:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-alpine
        RUN apk add --no-cache python3 make g++
        WORKDIR /build
        COPY package.json package-lock.json ./
        COPY packages/shared/package.json ./packages/shared/
        COPY packages/server/package.json ./packages/server/
        COPY packages/web/package.json ./packages/web/
        COPY packages/plugin/package.json ./packages/plugin/
        RUN npm ci
    working_dir: /build/packages/server
    command: npx drizzle-kit studio --host 0.0.0.0
    ports:
      - "4983:4983"
    volumes:
      - dev-data:/data
      - ./packages/server:/build/packages/server
      - ./packages/shared:/build/packages/shared
      - ./tsconfig.base.json:/build/tsconfig.base.json:ro
    environment:
      AI_SPACES_DB: /data/ai-spaces.db
    depends_on:
      - dev
    networks:
      - ai-spaces
    profiles:
      - studio

volumes:
  openclaw-home:
  dev-data:
  dev-pairing:

networks:
  ai-spaces:
    driver: bridge
