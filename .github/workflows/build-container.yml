name: Build Container

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths:
      - '.github/workflows/build-container.yml'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'scripts/package-openclaw-plugin.mjs'
      - 'packages/**'
  pull_request:
    paths:
      - '.github/workflows/build-container.yml'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'
      - 'scripts/package-openclaw-plugin.mjs'
      - 'packages/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-checks:
    name: Typecheck and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build shared package
        run: npm run build:shared

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build-container:
    name: Build and publish container
    runs-on: ubuntu-latest
    needs: ci-checks
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/beta' ||
      github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for healthcheck verification
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ai-spaces:ci
          cache-from: |
            type=gha,scope=container-build
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=container-build
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Verify container healthcheck
        run: |
          docker run -d --name ai-spaces-healthcheck-test ai-spaces:ci
          trap 'docker rm -f ai-spaces-healthcheck-test >/dev/null 2>&1 || true' EXIT

          for _ in {1..20}; do
            health_status="$(docker inspect --format='{{.State.Health.Status}}' ai-spaces-healthcheck-test)"
            if [ "$health_status" = "healthy" ]; then
              exit 0
            fi
            if [ "$health_status" = "unhealthy" ]; then
              docker logs ai-spaces-healthcheck-test
              exit 1
            fi
            sleep 3
          done

          docker inspect ai-spaces-healthcheck-test
          docker logs ai-spaces-healthcheck-test
          exit 1

      - name: Tag and publish healthchecked image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          if [ -z "$IMAGE_TAGS" ]; then
            echo "No tags generated by docker/metadata-action"
            exit 1
          fi

          printf '%s\n' "$IMAGE_TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker tag ai-spaces:ci "$tag"
            docker push "$tag"
          done
