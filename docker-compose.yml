services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    user: root
    entrypoint: ["/bin/sh", "/scripts/openclaw-entrypoint.sh"]
    environment:
      OPENCLAW_HOME: /home/openclaw
      OPENCLAW_SANDBOX_HOME: /home/openclaw
      PLUGIN_DIST: /plugins/ai-spaces/index.js
      OPENCLAW_GATEWAY_PORT: "19000"
      OPENCLAW_DISABLE_BONJOUR: "1"
      AI_SPACES_URL: http://sidecar:3001
      AI_SPACES_WS_PORT: "3002"
    volumes:
      - openclaw-home:/home/openclaw
      - ./packages/plugin/dist:/plugins/ai-spaces:ro
      - ./scripts/sandbox-template/.openclaw/openclaw.json:/tpl/openclaw.json.tpl:ro
      - ./scripts/sandbox-template/spaces.json:/tpl/spaces.json.tpl:ro
      - ./scripts/sandbox-template/workspace:/tpl/workspace:ro
    networks:
      - ai-spaces

  sidecar:
    build:
      context: .
      dockerfile: Dockerfile.sidecar
      target: runtime
    environment:
      OPENCLAW_HOME: /home/openclaw
      GATEWAY_URL: http://openclaw:19000
      GATEWAY_TOKEN: secret
      PLUGIN_WS_URL: ws://openclaw:3002
    volumes:
      - openclaw-home:/home/openclaw:ro
      - sidecar-data:/data
    ports:
      - "3001:3001"
    depends_on:
      - openclaw
    networks:
      - ai-spaces

volumes:
  openclaw-home:
  sidecar-data:

networks:
  ai-spaces:
    driver: bridge
