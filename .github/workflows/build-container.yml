name: Build Container

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-container:
    name: Build and publish container
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build packages
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for healthcheck verification
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ai-spaces:healthcheck
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container healthcheck
        run: |
          docker run -d --name ai-spaces-healthcheck-test ai-spaces:healthcheck
          trap 'docker rm -f ai-spaces-healthcheck-test >/dev/null 2>&1 || true' EXIT

          for _ in {1..20}; do
            health_status="$(docker inspect --format='{{.State.Health.Status}}' ai-spaces-healthcheck-test)"
            if [ "$health_status" = "healthy" ]; then
              exit 0
            fi
            if [ "$health_status" = "unhealthy" ]; then
              docker logs ai-spaces-healthcheck-test
              exit 1
            fi
            sleep 3
          done

          docker inspect ai-spaces-healthcheck-test
          docker logs ai-spaces-healthcheck-test
          exit 1

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
